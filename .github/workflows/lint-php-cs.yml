name: Lint PHP CS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: modules/Nfse

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Configure nfse-php repository
        working-directory: modules/Nfse
        run: composer config repositories.librecodeoop-nfse-php vcs https://github.com/LibreCodeCoop/nfse-php.git

      - name: Install dependencies
        working-directory: modules/Nfse
        run: composer install --prefer-dist --no-progress

      - name: Run PHP-CS-Fixer (check only)
        working-directory: modules/Nfse
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
