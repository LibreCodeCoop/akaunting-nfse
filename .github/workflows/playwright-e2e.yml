name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Akaunting base URL (e.g. https://your-akaunting.example)"
        required: true
        type: string

env:
  NFSE_E2E_BASE_URL: ${{ inputs.base_url }}
  NFSE_E2E_EMAIL: ${{ secrets.NFSE_E2E_EMAIL }}
  NFSE_E2E_PASSWORD: ${{ secrets.NFSE_E2E_PASSWORD }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
