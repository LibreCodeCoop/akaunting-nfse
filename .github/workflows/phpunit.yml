name: PHPUnit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Checkout nfse-php sibling package
        uses: actions/checkout@v6
        with:
          repository: LibreCodeCoop/nfse-php
          path: packages/librecodeoop/nfse-php

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      - name: Configure local nfse-php path repository
        run: composer config --global repositories.librecodeoop-nfse-php '{"type":"path","url":"'"$GITHUB_WORKSPACE"'/packages/librecodeoop/nfse-php","options":{"symlink":false}}'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit (Unit)
        run: vendor/bin/phpunit --testsuite Unit
