name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/LibreCodeCoop/akaunting-nfse/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement
  - title: '🐛 Bug Fixes'
    labels:
      - fix
      - bugfix
      - bug
  - title: '🧰 Maintenance'
    labels:
      - chore
      - refactor
      - dependencies
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    default: true
autolabeler:
  - label: feature
    title:
      - '/^feat(\(.+\))?:/i'
  - label: fix
    title:
      - '/^fix(\(.+\))?:/i'
  - label: chore
    title:
      - '/^chore(\(.+\))?:/i'
  - label: refactor
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: dependencies
    title:
      - '/^build\(deps\)/i'
